name: gym_management_system
description: Gym Power - Complete Gym Management System
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8

  # STATE MANAGEMENT
  provider: ^6.1.2

  # FIREBASE
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.2
  cloud_firestore: ^5.6.6

  # UTILITIES
  uuid: ^4.5.1
  intl: ^0.20.2

  # LOCAL STORAGE
  shared_preferences: ^2.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

  # APP ICON
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "lib/assets/images/icon.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true

  assets:
    - lib/assets/images/